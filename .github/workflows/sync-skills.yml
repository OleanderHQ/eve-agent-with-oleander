name: Sync Skills

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update project skills
        run: npx --yes skills@1 update --project --yes

      - name: Validate agent
        run: npx eve build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-oleander-skills
          delete-branch: true
          commit-message: "Update skills"
          title: "Update skills"
          body: |
            Updates the bundled agent skills from `OleanderHQ/skills`.

            This pull request was created automatically by the Sync Skills workflow.
          add-paths: |
            agent/skills/**
            skills-lock.json
